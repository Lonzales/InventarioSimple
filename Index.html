<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Boxicons CSS -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/Style.css">
    <!-- Jquery -->
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>

    <title>Inventario Simple</title>
</head>
<body>
    <div id="container">
        <div id="mainContainer">
            <div id="content">
                <table id="table" class="table">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Description</th>
                            <th>Price</th>
                            <th>Tags</th>
                        </tr>
                    </thead>
                    <!-- Esto se llena despues -->
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="4">There's no data available.</td>
                        </tr>
                    </tbody>
                </table>

                <div class="optionsMenu">
                    <button id="editRowBtn" class="btn editBtn">Edit Data</button>
                    <button id="removeRowBtn" class="btn deleteBtn">Remove Data</button>
                </div>
            </div>
            <button id="sideMenuBtn">
                <i class="bx bx-caret-right"></i>
            </button>
        </div>

        <div id="sideContainer">
            <h1>Side Menu</h1>
            <form id="mainForm">
                <input id="itemId" name="itemId" type="number" hidden/>
                <div class="inputContainer">
                    <label for="itemName">Item Name <span style="color: red;">*</span></label>
                    <input id="itemName" name="itemName" type="text" class="input" maxlength="25"/>
                </div>
                
                <div class="inputContainer">
                    <label for="itemDesc">Item Description <span style="color: red;">*</span></label>
                    <textarea id="itemDesc" name="itemDesc" class="input textarea" maxlength="60"></textarea>
                </div>

                <div class="inputContainer">
                    <label>Item Tag</label>
                    <span class="input selectInput">
                        <p>Select Tags</p>
                        <i class="bx bx-caret-down"></i>
                        <div class="selectContent">
                            <div id="tagsDropMenu" class="contentContainer">
                                <p>Loading...</p>
                            </div>
                        </div>
                    </span>
                </div>

                <div class="inputContainer">
                    <label for="itemPrice">Item Price <span style="color: red;">*</span></label>
                    <input id="itemPrice" name="itemPrice" type="number" class="input" min="1" step="1" maxlength="10"/>
                </div>

                <div class="optionsMenu">
                    <button id="addRowBtn" class="btn addBtn bx bx-plus" type="submit"></button>
                    <button id="cancelRowBtn" class="btn deleteBtn bx bx-x" type="button"></button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/Script.js"></script>
</body>
</html>
